name: TG Signal Parser

on:
  schedule:
    - cron: '30 */2 * * *'  # Every 2 hours at :30
  workflow_dispatch:
    inputs:
      limit:
        description: 'Messages per channel'
        required: false
        default: '30'

concurrency:
  group: tg-parse
  cancel-in-progress: false

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONIOENCODING: utf-8
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
      TG_CHANNELS: ${{ vars.TG_CHANNELS }}
      TG_PARSE_LIMIT: ${{ inputs.limit || '30' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Parse Telegram channels
        run: python tg_parser.py

      - name: Write summary
        if: always()
        run: |
          echo "## TG Signal Parser" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Channels:** $TG_CHANNELS" >> $GITHUB_STEP_SUMMARY
          echo "- **Limit:** ${TG_PARSE_LIMIT} messages/channel" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
